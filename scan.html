<!DOCTYPE html>

<html>

<body>


<h1>
KEHADIRAN PKPJ
</h1>


<input id="nama" placeholder="Nama">

<br>

<input id="telefon" placeholder="No Telefon">

<br>


<button onclick="hantar()">

HANTAR

</button>



<p id="msg"></p>




<script>


const API="URL_APPS_SCRIPT";


function hantar(){


fetch(
API+
"?action=register"+
"&nama="+nama.value+
"&telefon="+telefon.value
)


.then(r=>r.json())

.then(()=>{

msg.innerHTML=
"KEHADIRAN BERJAYA DIREKODKAN";

});


}


</script>


</body>

</html>
