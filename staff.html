<!DOCTYPE html>

<html>

<body>


<h1>
PENGESAHAN KEHADIRAN
</h1>


<table border="1">

<tbody id="data">

</tbody>

</table>



<script>


const API="URL_APPSCRIPT";



function load(){


fetch(
API+"?action=attendance"
)


.then(r=>r.json())


.then(d=>{


let html="";



for(let i=1;i<d.length;i++){



html+=`

<tr>

<td>${d[i][1]}</td>

<td>${d[i][3]}</td>


<td>

<button onclick="ok(${i+1})">

SAHKAN

</button>

</td>


</tr>

`;


}


data.innerHTML=html;


});



}



function ok(row){


fetch(
API+
"?action=approve&row="+row
)
.then(()=>load());


}



load();


</script>


</body>

</html>
