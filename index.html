<!DOCTYPE html>
<html>

<head>

<title>
Cabutan Bertuah PKPJ
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<!-- HEADER -->

<div class="header">


<img src="pkpj.png" class="logo">


<div class="header-text">

<h1>
CABUTAN BERTUAH
</h1>


<p>
PERBADANAN KEMAJUAN PERUMAHAN JOHOR
</p>


</div>


</div>





<!-- MAIN DASHBOARD -->

<div class="main">



<!-- PANEL KIRI -->

<div class="sidebar">


<h2>
MAKLUMAT CABUTAN
</h2>




<!-- JUMLAH PESERTA -->

<div class="stat">


<div class="icon">
👥
</div>


<div>


<label>
JUMLAH PESERTA
</label>


<strong id="peserta">
0
</strong>


<p>
orang
</p>


</div>


</div>





<!-- KEHADIRAN QR -->

<div class="stat">


<div class="icon">
📱
</div>


<div>


<label>
KEHADIRAN
</label>


<strong id="hadir">
0
</strong>


<p>
orang
</p>


</div>


</div>





<!-- JUMLAH HADIAH -->


<div class="stat">


<div class="icon">
🎁
</div>


<div>


<label>
JUMLAH HADIAH
</label>


<strong>
20
</strong>


<p>
hadiah
</p>


</div>


</div>





<!-- CABUTAN KE -->


<div class="stat">


<div class="icon">
🏆
</div>


<div>


<label>
CABUTAN KE
</label>


<strong id="cabutan">
1 / 20
</strong>


</div>


</div>






<button onclick="startDraw()">

▶ MULA CABUTAN

</button>




<button class="reset"
onclick="resetWinner()">

↻ RESET

</button>




</div>










<!-- WINNER AREA -->


<div class="winner-box">


<div class="winner-title">

⭐ TAHNIAH! ⭐

</div>



<p class="pemenang">

PEMENANG

</p>




<div id="winner">

SEDIA UNTUK CABUTAN

</div>





<div class="hadiah">


<div id="hadiah">

HADIAH UTAMA

</div>


</div>





</div>





</div>








<!-- SENARAI PEMENANG -->


<div class="winner-list">


<h2>

🏆 SENARAI PEMENANG

</h2>



<table>


<thead>

<tr>

<th>
BIL
</th>


<th>
NAMA
</th>


<th>
HADIAH
</th>


<th>
MASA
</th>


</tr>


</thead>



<tbody id="list">


</tbody>




</table>



</div>








<!-- CONFETTI -->

<canvas id="confetti"></canvas>





<script src="script.js"></script>



</body>


</html>
