<!DOCTYPE html>

<html>

<head>

<title>
Sistem Cabutan Bertuah PKPJ
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<!-- HEADER -->

<header class="header">


<img src="pkpj.png" class="logo">


<div class="header-title">

<h1>
CABUTAN BERTUAH
</h1>


<p>
PERBADANAN KEMAJUAN PERUMAHAN JOHOR
</p>


</div>


<button class="fullscreen"
onclick="fullscreen()">

⛶

</button>


</header>







<!-- DASHBOARD -->


<section class="dashboard">



<!-- LEFT PANEL -->


<div class="panel">


<h2>
📊 MAKLUMAT CABUTAN
</h2>




<div class="card">


<span>
👥
</span>


<div>

<label>
JUMLAH PESERTA
</label>


<strong id="peserta">
0
</strong>


<p>
orang
</p>


</div>


</div>







<div class="card">


<span>
📱
</span>


<div>


<label>
KEHADIRAN
</label>


<strong id="hadir">
0
</strong>


<p>
orang
</p>


</div>


</div>






<div class="card">


<span>
🎁
</span>


<div>


<label>
JUMLAH HADIAH
</label>


<strong>
20
</strong>


<p>
hadiah
</p>


</div>


</div>







<div class="card">


<span>
🏆
</span>


<div>


<label>
CABUTAN KE
</label>


<strong id="cabutan">
1 / 20
</strong>


</div>


</div>







<button onclick="startDraw()"
class="start">


🎲 MULA CABUTAN


</button>




<button onclick="resetWinner()"
class="reset">


↻ RESET


</button>




</div>









<!-- WINNER AREA -->


<div class="winner-area">



<div class="countdown"
id="countdown">


</div>




<h2>
⭐ TAHNIAH! ⭐
</h2>



<p>
PEMENANG
</p>




<div id="winner">

SEDIA UNTUK CABUTAN

</div>






<div class="prize">


🎁

<span id="hadiah">

HADIAH UTAMA

</span>


</div>




</div>





</section>








<!-- WINNER TABLE -->


<section class="table-section">


<h2>

🏆 SENARAI PEMENANG

</h2>



<table>


<thead>


<tr>

<th>
BIL
</th>


<th>
NAMA
</th>


<th>
HADIAH
</th>


<th>
MASA
</th>


</tr>



</thead>



<tbody id="list">


</tbody>



</table>



</section>








<!-- CONFETTI -->

<canvas id="confetti"></canvas>






<!-- SOUND -->


<audio id="drumroll">

<source src="drumroll.mp3">

</audio>



<audio id="winnerSound">

<source src="winner.mp3">

</audio>







<script src="script.js"></script>



</body>


</html>
