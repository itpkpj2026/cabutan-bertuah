<!DOCTYPE html>
<html>

<head>

<title>
Cabutan Bertuah PKPJ
</title>

<link rel="stylesheet" href="index.css">

</head>


<body>


<header>

<div class="brand">

<img src="pkpj.png">

<div>
<h1>CABUTAN BERTUAH</h1>
<p>PERBADANAN KEMAJUAN PERUMAHAN JOHOR</p>
</div>

</div>


<button class="fullscreen" onclick="fullscreenMode()">
⛶
</button>

<div class="container">

<div class="left">


<h2>MAKLUMAT CABUTAN</h2>



<div class="info">

👥

<div>
<label>
JUMLAH PESERTA
</label>

<strong id="peserta">
0
</strong>

<span>
orang
</span>

</div>

</div>




<div class="info">

📱

<div>

<label>
KEHADIRAN
</label>

<strong id="hadir">
0
</strong>

<span>
orang
</span>

</div>

</div>




<div class="info">

🎁

<div>

<label>
JUMLAH HADIAH
</label>

<strong>
20
</strong>

<span>
hadiah
</span>

</div>

</div>




<div class="info">

🏆

<div>

<label>
CABUTAN KE
</label>

<strong id="cabutan">
1 / 20
</strong>


</div>

</div>



<button class="start"
onclick="startDraw()">

▶ MULA CABUTAN

</button>



<button class="reset"
onclick="resetWinner()">

↻ RESET

</button>


</div>







<!-- CENTER -->

<div class="winner">


<div id="countdown">

</div>


<h2>
⭐ TAHNIAH! ⭐
</h2>


<p>
PEMENANG
</p>


<div id="winner">

<div class="prize">

🎁

<span id="hadiah">
SEDIA UNTUK CABUTAN

</div>


</div>


</div>







<div class="table">


<h2>
🏆 SENARAI PEMENANG
</h2>


<table>


<thead>

<tr>

<th>
BIL
</th>

<th>
NAMA
</th>

<th>
HADIAH
</th>

<th>
MASA
</th>

</tr>


</thead>



<tbody id="list">


</tbody>


</table>


</div>





<audio id="drumroll">
<source src="drumroll.mp3">
</audio>


<audio id="winnerSound">
<source src="winner.mp3">
</audio>


<canvas id="confetti"></canvas>



<script src="script.js"></script>


</body>

</html>
