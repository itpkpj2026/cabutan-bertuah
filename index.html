<!DOCTYPE html>
<html>

<head>

<title>Cabutan Bertuah PKPJ</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="header">

<img src="pkpj.png" class="logo">


<div class="header-text">

<h1>CABUTAN BERTUAH</h1>

<p>
PERBADANAN KEMAJUAN PERUMAHAN JOHOR
</p>

</div>

</div>




<div class="main">


<!-- PANEL KIRI -->

<div class="sidebar">


<h2>MAKLUMAT CABUTAN</h2>


<div class="stat">

<span>👥</span>

<div>

<label>
JUMLAH PESERTA
</label>

<strong>
140
</strong>

<p>
orang
</p>

</div>

</div>




<div class="stat">

<span>🎁</span>

<div>

<label>
JUMLAH HADIAH
</label>

<strong>
20
</strong>

<p>
hadiah
</p>

</div>

</div>




<div class="stat">

<span>🏆</span>

<div>

<label>
CABUTAN KE
</label>

<strong>
1 / 20
</strong>


</div>

</div>




<button onclick="startDraw()">
▶ MULA CABUTAN
</button>


<button class="reset"
onclick="resetWinner()">
↻ RESET
</button>



</div>





<!-- WINNER -->

<div class="winner-box">


<div class="winner-title">

</div>


<p class="pemenang">
PEMENANG
</p>



<div id="winner">

</div>



<div class="hadiah">

HADIAH UTAMA

</div>



</div>



</div>





<!-- LIST -->

<div class="winner-list">


<h2>
🏆 SENARAI PEMENANG
</h2>


<table>


<tr>

<th>
BIL
</th>

<th>
NAMA
</th>

<th>
HADIAH
</th>

<th>
MASA
</th>

</tr>


<tbody id="list">

</tbody>


</table>


</div>




<script src="script.js"></script>


</body>


</html>
