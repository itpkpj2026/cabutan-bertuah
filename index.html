<!DOCTYPE html>

<html>

<head>

<title>
Cabutan Bertuah PKPJ
</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


body{

margin:0;

background:#021b36;

font-family:Arial, sans-serif;

color:white;

text-align:center;

}



header{

padding:20px;

background:#052b55;

border-bottom:3px solid gold;

}



.logo{

width:70px;

height:70px;

object-fit:contain;

background:white;

border-radius:10px;

}



h1{

color:#ffd000;

font-size:40px;

margin:10px;

}



h2{

font-size:28px;

}



.container{


display:flex;

flex-direction:column;

align-items:center;

padding:20px;

}



canvas{

background:white;

border-radius:50%;

margin-top:20px;

box-shadow:
0 0 30px gold;


}



button{


margin:15px;

padding:18px 50px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:15px;

cursor:pointer;


}



.spin{


background:#ffd000;

color:#052b55;


}



.reset{


background:#d62828;

color:white;


}



#winner{


margin-top:20px;

font-size:45px;

font-weight:bold;

color:#ffd000;

}



#hadiah{


font-size:25px;

background:white;

color:#052b55;

padding:15px;

border-radius:15px;

margin-top:20px;

}



.info{


font-size:20px;

}



</style>


</head>



<body>



<header>


<img src="pkpj.png" class="logo">


<h1>
CABUTAN BERTUAH PKPJ
</h1>


<h2>
🎡 SPIN WHEEL
</h2>


</header>





<div class="container">



<div class="info">

Peserta Layak:

<span id="jumlah">
0
</span>

orang

</div>




<canvas id="wheel" width="600" height="600"></canvas>




<button class="spin" onclick="spin()">

🎡 MULA CABUTAN

</button>




<button class="reset" onclick="resetWheel()">

RESET

</button>





<div id="winner">

SEDIA UNTUK CABUTAN

</div>




<div id="hadiah">

🎁 HADIAH

</div>




</div>









<script>


// ==========================
// URL APPS SCRIPT
// ==========================


const API =

"https://script.google.com/macros/s/URL_ANDA/exec";






let names=[];


let angle=0;


let spinning=false;





const canvas =

document.getElementById("wheel");



const ctx =
canvas.getContext("2d");





// ==========================
// LOAD NAMA
// ==========================


function loadNames(){


fetch(
API+"?action=wheel"
)


.then(r=>r.json())


.then(data=>{


names=data;


document
.getElementById("jumlah")
.innerHTML=
names.length;



drawWheel();


});


}







// ==========================
// DRAW WHEEL
// ==========================


function drawWheel(){



let size =
names.length;



if(size==0)
return;




let arc =
Math.PI*2/size;




ctx.clearRect(
0,
0,
600,
600
);



for(let i=0;i<size;i++){



ctx.beginPath();



ctx.moveTo(
300,
300
);



ctx.arc(

300,

300,

300,

angle+i*arc,

angle+(i+1)*arc

);



ctx.fillStyle =
i%2==0
?
"#ffd000"
:
"#052b55";



ctx.fill();



ctx.save();



ctx.translate(
300,
300
);



ctx.rotate(
angle+i*arc+arc/2
);



ctx.fillStyle =
i%2==0
?
"#052b55"
:
"white";



ctx.font="18px Arial";



ctx.fillText(

names[i].substring(0,15),

80,

0

);



ctx.restore();



}



}





// ==========================
// SPIN
// ==========================


function spin(){



if(spinning)
return;



if(names.length==0){

alert(
"Tiada peserta"
);

return;

}



spinning=true;



let target =
Math.random()*3000+3000;



let start =
Date.now();



let duration =
4000;



function animate(){



let now =
Date.now();



let progress =
(now-start)/duration;



if(progress<1){


angle +=

(target*(progress))/80;



drawWheel();


requestAnimationFrame(animate);



}

else{



spinning=false;


selectWinner();



}



}



animate();



}







// ==========================
// WINNER
// ==========================


function selectWinner(){



let winner =

names[
Math.floor(
Math.random()*names.length
)
];



document
.getElementById("winner")
.innerHTML=

"🎉 "+winner;



document
.getElementById("hadiah")
.innerHTML=

"🎁 SILA RUJUK HADIAH CABUTAN";



}







function resetWheel(){



document
.getElementById("winner")
.innerHTML=

"SEDIA UNTUK CABUTAN";



document
.getElementById("hadiah")
.innerHTML=

"🎁 HADIAH";



}






loadNames();



</script>



</body>

</html>
